<!DOCTYPE html>
<html lang="uk">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="refresh" content="0; url=https://atb-stalker-online-colection.netlify.app/">
   <title>Перенаправлення...</title>
   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      body {
         font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
         color: #F2E8D9;
         display: flex;
         justify-content: center;
         align-items: center;
         min-height: 100vh;
         padding: 20px;
      }

      .container {
         text-align: center;
         max-width: 600px;
         background-color: rgba(0, 0, 0, 0.5);
         padding: 3rem 2rem;
         border: 2px solid #ff9000;
         box-shadow: 0 0 30px rgba(255, 144, 0, 0.3);
      }

      h1 {
         font-size: 2rem;
         color: #ff9000;
         margin-bottom: 1.5rem;
         text-transform: uppercase;
         letter-spacing: 0.1em;
      }

      p {
         font-size: 1.1rem;
         line-height: 1.6;
         margin-bottom: 2rem;
         color: #F2E8D9;
      }

      .link {
         display: inline-block;
         padding: 1rem 2rem;
         background-color: #ff9000;
         color: #1a1a1a;
         text-decoration: none;
         font-weight: 600;
         font-size: 1.1rem;
         border: 2px solid #ff9000;
         transition: all 0.3s ease;
         text-transform: uppercase;
         letter-spacing: 0.05em;
      }

      .link:hover {
         background-color: transparent;
         color: #ff9000;
         transform: translateY(-2px);
         box-shadow: 0 5px 15px rgba(255, 144, 0, 0.4);
      }

      .spinner {
         margin: 2rem auto 1rem;
         width: 50px;
         height: 50px;
         border: 4px solid rgba(255, 144, 0, 0.2);
         border-top: 4px solid #ff9000;
         border-radius: 50%;
         animation: spin 1s linear infinite;
      }

      @keyframes spin {
         0% {
            transform: rotate(0deg);
         }

         100% {
            transform: rotate(360deg);
         }
      }

      @media (max-width: 768px) {
         h1 {
            font-size: 1.5rem;
         }

         p {
            font-size: 1rem;
         }

         .container {
            padding: 2rem 1.5rem;
         }
      }
   </style>
   <script>

      </a>
